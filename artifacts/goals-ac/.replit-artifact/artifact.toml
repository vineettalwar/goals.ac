kind = "web"
previewPath = "/"
title = "goals.ac"
version = "1.0.0"
id = "artifacts/goals-ac"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23600

[services.development]
run = "pnpm --filter @workspace/goals-ac run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/goals-ac", "run", "build" ]
publicDir = "artifacts/goals-ac/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23600"
BASE_PATH = "/"
